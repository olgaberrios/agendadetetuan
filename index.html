<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Tetuán</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rojo: #E3051B;
      --rojo-oscuro: #B00015;
      --azul: #003DA5;
      --azul-claro: #0055C8;
      --amarillo: #FFD700;
      --blanco: #FAFAFA;
      --negro: #0A0A0A;
      --gris: #1C1C1E;
      --gris-medio: #2C2C2E;
      --gris-claro: #3A3A3C;
      --texto-secundario: #AEAEB2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--negro);
      color: var(--blanco);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--negro);
      border-bottom: 4px solid var(--rojo);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* Logo Metro de Madrid */
    .metro-logo {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .metro-diamond {
      width: 52px;
      height: 52px;
      background: var(--rojo);
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--rojo-oscuro);
    }

    .metro-diamond-inner {
      width: 34px;
      height: 34px;
      background: var(--negro);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metro-m {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--blanco);
      transform: rotate(-45deg);
      letter-spacing: -1px;
      line-height: 1;
    }

    .header-text {
      display: flex;
      flex-direction: column;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--blanco);
      line-height: 1;
    }

    .header-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--rojo);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-line {
      flex-grow: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--rojo) 0%, transparent 100%);
      margin-left: 12px;
    }

    /* Línea de metro decorativa */
    .metro-line-bar {
      background: var(--gris);
      padding: 6px 0;
      overflow: hidden;
    }

    .metro-line-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .metro-station {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--texto-secundario);
      white-space: nowrap;
    }

    .metro-station::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--rojo);
      background: var(--negro);
      flex-shrink: 0;
    }

    .metro-station.active::before {
      background: var(--rojo);
    }

    .metro-connector {
      flex-grow: 1;
      height: 2px;
      background: var(--rojo);
      min-width: 20px;
    }

    /* ─── MAIN ─── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Filtros / navegación temporal */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      align-items: center;
    }

    .filter-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--texto-secundario);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 4px;
    }

    .filter-btn {
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      color: var(--texto-secundario);
      padding: 6px 14px;
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--rojo);
      border-color: var(--rojo);
      color: var(--blanco);
    }

    /* ─── VISTA CALENDARIO ─── */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .view-btn {
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      color: var(--texto-secundario);
      padding: 6px 10px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
    }

    .view-btn.active, .view-btn:hover {
      background: var(--azul);
      border-color: var(--azul);
      color: var(--blanco);
    }

    /* ─── GRID DE EVENTOS ─── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .events-grid.list-view {
      grid-template-columns: 1fr;
    }

    /* Tarjeta de evento */
    .event-card {
      background: var(--gris);
      border: 1px solid var(--gris-claro);
      border-left: 4px solid var(--rojo);
      border-radius: 0 4px 4px 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.15s, box-shadow 0.15s, border-left-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      background: var(--rojo);
      opacity: 0.04;
      border-radius: 50%;
      transform: translate(20px, -20px);
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(227,5,27,0.15);
      border-left-color: var(--rojo);
    }

    .event-card.list-view {
      flex-direction: row;
      align-items: flex-start;
    }

    /* Fecha */
    .event-date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--rojo);
      border-radius: 3px;
      padding: 8px 12px;
      min-width: 56px;
      flex-shrink: 0;
    }

    .event-day {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      line-height: 1;
      color: var(--blanco);
    }

    .event-month {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .event-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .event-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: var(--blanco);
      line-height: 1.1;
    }

    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .event-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--texto-secundario);
      font-family: 'IBM Plex Mono', monospace;
    }

    .event-meta-item .icon {
      font-size: 0.85rem;
      width: 14px;
      text-align: center;
    }

    .event-desc {
      font-size: 0.82rem;
      color: var(--texto-secundario);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .btn-calendar {
      background: var(--azul);
      color: var(--blanco);
      border: none;
      padding: 7px 14px;
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-calendar:hover { background: var(--azul-claro); }

    .btn-ics {
      background: transparent;
      color: var(--texto-secundario);
      border: 1px solid var(--gris-claro);
      padding: 7px 14px;
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-ics:hover {
      border-color: var(--rojo);
      color: var(--rojo);
    }

    .btn-expand {
      background: transparent;
      color: var(--texto-secundario);
      border: none;
      padding: 7px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: auto;
    }

    .btn-expand:hover { color: var(--blanco); }

    /* Estado vacío */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      grid-column: 1 / -1;
    }

    .empty-state .metro-diamond-lg {
      width: 80px;
      height: 80px;
      background: var(--gris-medio);
      transform: rotate(45deg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .empty-state h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--texto-secundario);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--gris-claro);
      font-size: 0.85rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Cargando */
    .loading {
      text-align: center;
      padding: 60px;
      grid-column: 1 / -1;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .loading-dot {
      width: 12px;
      height: 12px;
      background: var(--rojo);
      border-radius: 50%;
      animation: bounce 0.8s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-8px); opacity: 1; }
    }

    .loading p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--texto-secundario);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--gris);
      border: 1px solid var(--gris-claro);
      border-top: 4px solid var(--rojo);
      border-radius: 0 0 6px 6px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--blanco);
    }

    .modal-close {
      background: none;
      border: 1px solid var(--gris-claro);
      color: var(--texto-secundario);
      width: 32px;
      height: 32px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .modal-close:hover { border-color: var(--rojo); color: var(--rojo); }

    .modal-desc {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--texto-secundario);
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Footer */
    footer {
      border-top: 2px solid var(--gris-medio);
      padding: 24px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--gris-claro);
      letter-spacing: 1px;
    }

    footer a { color: var(--rojo); text-decoration: none; }

    /* Badge "hoy" */
    .badge-hoy {
      background: var(--rojo);
      color: var(--blanco);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
      vertical-align: middle;
    }

    /* Separador de mes */
    .month-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }

    .month-divider-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--rojo);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .month-divider-line {
      flex: 1;
      height: 1px;
      background: var(--gris-claro);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header-title { font-size: 1.6rem; }
      .events-grid { grid-template-columns: 1fr; }
      .metro-line-bar { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="metro-logo">
        <div class="metro-diamond">
          <div class="metro-diamond-inner">
            <span class="metro-m">M</span>
          </div>
        </div>
      </div>
      <div class="header-text">
        <div class="header-title">Agenda Tetuán</div>
        <div class="header-subtitle">Barrio de Tetuán · Madrid</div>
      </div>
      <div class="header-line"></div>
    </div>
  </header>

  <!-- LÍNEA DE METRO DECORATIVA -->
  <div class="metro-line-bar">
    <div class="metro-line-inner">
      <div class="metro-station">Cuatro Caminos</div>
      <div class="metro-connector"></div>
      <div class="metro-station active">Tetuán</div>
      <div class="metro-connector"></div>
      <div class="metro-station">Valdeacederas</div>
      <div class="metro-connector"></div>
      <div class="metro-station">Alvarado</div>
      <div class="metro-connector"></div>
      <div class="metro-station">La Paz</div>
      <div class="metro-connector"></div>
      <div class="metro-station">Estrecho</div>
      <div class="metro-connector"></div>
      <div class="metro-station">Ríos Rosas</div>
    </div>
  </div>

  <!-- MAIN -->
  <main>
    <!-- Filtros -->
    <div class="filters">
      <span class="filter-label">Ver:</span>
      <button class="filter-btn active" data-filter="proximos">Próximos</button>
      <button class="filter-btn" data-filter="semana">Esta semana</button>
      <button class="filter-btn" data-filter="mes">Este mes</button>
      <button class="filter-btn" data-filter="todos">Todos</button>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" title="Vista cuadrícula">⊞</button>
        <button class="view-btn" id="btn-list" title="Vista lista">☰</button>
      </div>
    </div>

    <!-- Grid de eventos -->
    <div class="events-grid" id="events-container">
      <div class="loading">
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
        <p>Cargando actividades...</p>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div id="modal-meta" style="margin-bottom:16px;display:flex;flex-direction:column;gap:6px;"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    Agenda Tetuán · Datos del canal <a href="https://t.me/agendatetuan" target="_blank">@agendatetuan</a> · 
    <a href="https://t.me/agenda_tetuan_bot" target="_blank">@agenda_tetuan_bot</a>
  </footer>

  <script>
    // ─── CONFIGURACIÓN ───────────────────────────────────────────
    const EVENTS_JSON_URL = './events.json'; // fichero de datos
    const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const MESES_LARGO = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

    let allEvents = [];
    let currentFilter = 'proximos';
    let isGridView = true;

    // ─── CARGAR EVENTOS ──────────────────────────────────────────
    async function loadEvents() {
      try {
        const res = await fetch(EVENTS_JSON_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('No se pudo cargar events.json');
        allEvents = await res.json();
        allEvents.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
        renderEvents(currentFilter);
      } catch (e) {
        document.getElementById('events-container').innerHTML = `
          <div class="empty-state">
            <h2>Sin eventos todavía</h2>
            <p>Publica algo en @agendatetuan y aparecerá aquí</p>
          </div>`;
      }
    }

    // ─── FILTRAR ─────────────────────────────────────────────────
    function filterEvents(filter) {
      const now = new Date();
      const hoy = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const semana = new Date(hoy); semana.setDate(hoy.getDate() + 7);
      const mes = new Date(hoy); mes.setDate(hoy.getDate() + 31);

      return allEvents.filter(ev => {
        const d = new Date(ev.datetime);
        if (filter === 'proximos') return d >= hoy;
        if (filter === 'semana') return d >= hoy && d <= semana;
        if (filter === 'mes') return d >= hoy && d <= mes;
        return true;
      });
    }

    // ─── RENDERIZAR ──────────────────────────────────────────────
    function renderEvents(filter) {
      const events = filterEvents(filter);
      const container = document.getElementById('events-container');
      container.className = 'events-grid' + (isGridView ? '' : ' list-view');

      if (!events.length) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>Sin actividades</h2>
            <p>No hay eventos para este periodo</p>
          </div>`;
        return;
      }

      let html = '';
      let lastMonth = -1;

      events.forEach((ev, i) => {
        const d = new Date(ev.datetime);
        const mes = d.getMonth();

        if (mes !== lastMonth) {
          html += `<div class="month-divider">
            <span class="month-divider-label">${MESES_LARGO[mes]} ${d.getFullYear()}</span>
            <div class="month-divider-line"></div>
          </div>`;
          lastMonth = mes;
        }

        const esHoy = isToday(d);
        const hora = d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
        const diaSemana = DIAS[d.getDay()];

        html += `<div class="event-card" data-idx="${i}">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <div class="event-date-block">
              <div class="event-day">${d.getDate()}</div>
              <div class="event-month">${MESES[mes]}</div>
            </div>
            <div class="event-content">
              <div class="event-title">${ev.title} ${esHoy ? '<span class="badge-hoy">Hoy</span>' : ''}</div>
              <div class="event-meta">
                <div class="event-meta-item"><span class="icon">🕐</span>${diaSemana} · ${hora}</div>
                ${ev.location ? `<div class="event-meta-item"><span class="icon">📍</span>${ev.location}</div>` : ''}
              </div>
            </div>
          </div>
          ${ev.description ? `<div class="event-desc">${ev.description}</div>` : ''}
          <div class="event-actions">
            <a class="btn-calendar" href="${buildGoogleCalUrl(ev)}" target="_blank">📅 Google Calendar</a>
            <a class="btn-ics" href="#" onclick="downloadICS(${i}, event)">⬇ .ICS</a>
            <button class="btn-expand" onclick="openModal(${i})">Ver más →</button>
          </div>
        </div>`;
      });

      container.innerHTML = html;
    }

    // ─── UTILIDADES DE FECHA ─────────────────────────────────────
    function isToday(d) {
      const hoy = new Date();
      return d.getDate() === hoy.getDate() && d.getMonth() === hoy.getMonth() && d.getFullYear() === hoy.getFullYear();
    }

    function toGCalDate(dt) {
      const d = new Date(dt);
      return d.toISOString().replace(/-|:|\.\d+/g, '').slice(0, 15) + 'Z';
    }

    function buildGoogleCalUrl(ev) {
      const start = toGCalDate(ev.datetime);
      const end = ev.end_datetime ? toGCalDate(ev.end_datetime) : (() => {
        const d = new Date(ev.datetime); d.setHours(d.getHours() + 2);
        return toGCalDate(d.toISOString());
      })();
      const params = new URLSearchParams({
        action: 'TEMPLATE',
        text: ev.title,
        dates: `${start}/${end}`,
        details: ev.description || '',
        location: ev.location || 'Tetuán, Madrid',
      });
      return `https://calendar.google.com/calendar/render?${params}`;
    }

    function buildICS(ev) {
      const start = toGCalDate(ev.datetime);
      const d2 = ev.end_datetime ? new Date(ev.end_datetime) : new Date(ev.datetime);
      if (!ev.end_datetime) d2.setHours(d2.getHours() + 2);
      const end = toGCalDate(d2.toISOString());
      return `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${ev.title}\nDTSTART:${start}\nDTEND:${end}\nLOCATION:${ev.location || 'Tetuán, Madrid'}\nDESCRIPTION:${(ev.description || '').replace(/\n/g, '\\n')}\nEND:VEVENT\nEND:VCALENDAR`;
    }

    function downloadICS(idx, e) {
      e.preventDefault();
      const ev = filterEvents(currentFilter)[idx];
      const blob = new Blob([buildICS(ev)], {type: 'text/calendar'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = ev.title.replace(/\s+/g, '_') + '.ics';
      a.click();
    }

    // ─── MODAL ───────────────────────────────────────────────────
    function openModal(idx) {
      const ev = filterEvents(currentFilter)[idx];
      const d = new Date(ev.datetime);
      const hora = d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});

      document.getElementById('modal-title').textContent = ev.title;
      document.getElementById('modal-meta').innerHTML = `
        <div class="event-meta-item"><span class="icon">📅</span>${DIAS[d.getDay()]}, ${d.getDate()} de ${MESES_LARGO[d.getMonth()]} · ${hora}</div>
        ${ev.location ? `<div class="event-meta-item"><span class="icon">📍</span>${ev.location}</div>` : ''}
      `;
      document.getElementById('modal-desc').textContent = ev.description || '';
      document.getElementById('modal-actions').innerHTML = `
        <a class="btn-calendar" href="${buildGoogleCalUrl(ev)}" target="_blank">📅 Google Calendar</a>
        <a class="btn-ics" href="#" onclick="downloadICS(${idx}, event)">⬇ Descargar .ICS</a>
      `;
      document.getElementById('modal-overlay').classList.add('open');
    }

    document.getElementById('modal-close').onclick = () =>
      document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-overlay').onclick = (e) => {
      if (e.target === document.getElementById('modal-overlay'))
        document.getElementById('modal-overlay').classList.remove('open');
    };

    // ─── FILTROS Y VISTA ─────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderEvents(currentFilter);
      });
    });

    document.getElementById('btn-grid').onclick = () => {
      isGridView = true;
      document.getElementById('btn-grid').classList.add('active');
      document.getElementById('btn-list').classList.remove('active');
      renderEvents(currentFilter);
    };

    document.getElementById('btn-list').onclick = () => {
      isGridView = false;
      document.getElementById('btn-list').classList.add('active');
      document.getElementById('btn-grid').classList.remove('active');
      renderEvents(currentFilter);
    };

    // ─── INIT ─────────────────────────────────────────────────────
    loadEvents();
  </script>
</body>
</html>
